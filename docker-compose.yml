services:
  cuda-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:-13.2.0}
        LOCAL_USER: ${LOCAL_USER:-devuser}
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
        NVM_VERSION: ${NVM_VERSION:-v0.40.4}
        NODE_VERSION: ${NODE_VERSION:-24.14.1}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        DEV_SECRETS_ARCHIVE_B64: ${DEV_SECRETS_ARCHIVE_B64:-}
        NVIDIA_DRIVER_BRANCH: ${NVIDIA_DRIVER_BRANCH:-}
    image: panjd123/cuda-env:${CUDA_VERSION:-13.2.0}
    container_name: ${COMPOSE_PROJECT_NAME:-cuda-env}-dev
    working_dir: /workspace
    tty: true
    stdin_open: true
    restart: unless-stopped
    privileged: true
    gpus: all
    ipc: host
    shm_size: "16gb"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CUDA_HOME: /usr/local/cuda
      HF_HOME: /home/${LOCAL_USER:-devuser}/.cache/huggingface
    volumes:
      - .:/workspace
      - ${CUDA_ENV_HF_CACHE_DIR}:/home/${LOCAL_USER:-devuser}/.cache/huggingface
    ports:
      - "22847:22"
